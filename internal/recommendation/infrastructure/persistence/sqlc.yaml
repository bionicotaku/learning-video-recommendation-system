version: "2"
sql:
  - engine: "postgresql"
    queries:
      - "query/*.sql"
    schema:
      - "schema/*.sql"
      - "../migration/000001_baseline.up.sql"
    gen:
      go:
        package: "recommendationsqlc"
        out: "sqlcgen"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_json_tags: true
        emit_empty_slices: true
