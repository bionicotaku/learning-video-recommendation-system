version: "2"
sql:
  - engine: "postgresql"
    schema:
      - "internal/learningengine/infrastructure/persistence/schema/*.sql"
      - "internal/learningengine/infrastructure/migration/*.up.sql"
    queries:
      - "internal/learningengine/infrastructure/persistence/query/*.sql"
    gen:
      go:
        package: "sqlcgen"
        out: "internal/learningengine/infrastructure/persistence/sqlcgen"
        sql_package: "pgx/v5"
  - engine: "postgresql"
    schema:
      - "internal/recommendation/scheduler/infrastructure/persistence/schema/*.sql"
      - "internal/learningengine/infrastructure/migration/*.up.sql"
      - "internal/recommendation/scheduler/infrastructure/migration/*.up.sql"
    queries:
      - "internal/recommendation/scheduler/infrastructure/persistence/query/*.sql"
    gen:
      go:
        package: "sqlcgen"
        out: "internal/recommendation/scheduler/infrastructure/persistence/sqlcgen"
        sql_package: "pgx/v5"
